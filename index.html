<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flabby Swaddy</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #70c5ce;
    }
    canvas {
        border: 2px solid black;
        touch-action: manipulation;
        display: block;
    }
</style>
</head>
<body>
<canvas id="flappyBirdCanvas"></canvas>
<script>
const canvas = document.getElementById('flappyBirdCanvas');
const ctx = canvas.getContext('2d');

// شاشة كاملة + Retina
let displayWidth = window.innerWidth;
let displayHeight = window.innerHeight;
let scale = window.devicePixelRatio || 1;
canvas.width = displayWidth * scale;
canvas.height = displayHeight * scale;
canvas.style.width = displayWidth + "px";
canvas.style.height = displayHeight + "px";
ctx.scale(scale, scale);
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

// الخلفية
let bgImage = new Image();
bgImage.src = 'CE20DCB8-55BF-4363-9A95-0CFD053150F7.jpeg';

// الطائر
let birdImage = new Image();
birdImage.src = 'C5B8E2ED-5DF8-4A76-B9C4-210F07E30949.jpeg';
let bird = { x: 50, y: 150, width: 50, height: 50, gravity: 0.5, lift: -7, velocity: 0, hitbox: {w:40, h:40} };

let pipes = [];  
let score = 0;
let frame = 0;
let lastPipeY = displayHeight/2 - 75; 
let isGameOver = false;
let gameOverButton = null;

// التحكم
function flap() { if(!isGameOver) bird.velocity = bird.lift; }
window.addEventListener('keydown', flap);
window.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });

// مستمع النقر للزر 🔁 واللعب
canvas.addEventListener('click', function(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width) / scale;
    const y = (e.clientY - rect.top) * (canvas.height / rect.height) / scale;

    // الزر فقط عند الخسارة
    if(isGameOver && gameOverButton){
        if(x >= gameOverButton.x && x <= gameOverButton.x + gameOverButton.w &&
           y >= gameOverButton.y && y <= gameOverButton.y + gameOverButton.h){
            restartGame();
        }
    } else if(!isGameOver){
        flap();
    }
});

// إعادة ضبط اللعبة
function restartGame(){
    score = 0;
    bird.y = displayHeight/2;
    bird.velocity = 0;
    pipes = [];
    lastPipeY = displayHeight/2 - 75;
    isGameOver = false;
}

// إنشاء أعمدة مع فتحة منطقية وصعبة
function createPipe() {
    const gap = 130;
    const minY = 50;
    const maxY = displayHeight - gap - 50;
    const maxDiff = 250;
    let pipeY;

    if(Math.random() < 0.3){
        pipeY = Math.random() * (maxY - minY) + minY;
    } else {
        let change = (Math.random()*2*maxDiff - maxDiff);
        pipeY = lastPipeY + change;
    }

    if(pipeY < minY) pipeY = minY;
    if(pipeY > maxY) pipeY = maxY;

    lastPipeY = pipeY;

    pipes.push({ x: displayWidth, y: 0, width: 20, height: pipeY, scored:false });
    pipes.push({ x: displayWidth, y: pipeY + gap, width: 20, height: displayHeight - (pipeY + gap) });
}

// تصادم
function collision(pipe){
    let hb = bird.hitbox;
    return (bird.x + (bird.width - hb.w)/2) < pipe.x + pipe.width &&
           (bird.x + (bird.width - hb.w)/2 + hb.w) > pipe.x &&
           (bird.y + (bird.height - hb.h)/2) < pipe.height &&
           (bird.y + (bird.height - hb.h)/2 + hb.h) > pipe.y;
}

function update(){
    if(!isGameOver){
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;

        if(bird.y + bird.height/2 >= displayHeight || bird.y - bird.height/2 <= 0) isGameOver = true;

        frame++;
        if(frame % 75 === 0) createPipe();

        pipes.forEach((pipe, index)=>{
            pipe.x -= 3.2; 
            if(collision(pipe)) isGameOver = true;

            // إزالة الأعمدة بعد الخروج من الشاشة
            if(pipe.x + pipe.width < 0) pipes.splice(index,1);

            // نقاط فقط عند مرور العمود العلوي
            if(!pipe.scored && pipe.y === 0 && bird.x > pipe.x + pipe.width){
                score++;
                pipe.scored = true;
            }
        });
    }

    // رسم الخلفية
    if(bgImage.complete){
        let ratio = Math.max(displayWidth/bgImage.width, displayHeight/bgImage.height);
        let w = bgImage.width*ratio;
        let h = bgImage.height*ratio;
        let sx = (w - displayWidth)/2 / ratio;
        let sy = (h - displayHeight)/2 / ratio;
        ctx.drawImage(bgImage, sx, sy, displayWidth/ratio, displayHeight/ratio, 0, 0, displayWidth, displayHeight);
    } else {
        ctx.fillStyle = '#70c5ce';
        ctx.fillRect(0,0,displayWidth,displayHeight);
    }

    // رسم الطائر
    if(birdImage.complete){
        ctx.save();
        ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
        ctx.drawImage(birdImage, -bird.width/2, -bird.height/2, bird.width, bird.height);
        ctx.restore();
    } else {
        ctx.fillStyle = 'yellow';
        ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
    }

    // رسم الأعمدة
    pipes.forEach(pipe => ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height));

    // عرض النقاط
    ctx.fillStyle='yellow';
    ctx.font='20px Arial';
    ctx.fillText('النقاط: '+score,10,20);

    // واجهة Game Over
    if(isGameOver){
        const rectWidth = 300;
        const rectHeight = 400;
        const rectX = displayWidth/2 - rectWidth/2;
        const rectY = displayHeight/2 - rectHeight/2;

        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(rectX, rectY, rectWidth, rectHeight);

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 4;
        ctx.strokeRect(rectX, rectY, rectWidth, rectHeight);

        // صورة الطائر أعلى المستطيل
        if(birdImage.complete){
            let birdSize = 100;
            ctx.drawImage(birdImage, displayWidth/2 - birdSize/2, rectY - birdSize/2, birdSize, birdSize);
        }

        // اسم الطائر
        ctx.fillStyle = 'white';
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ايا فايج', displayWidth/2, rectY + 80);

        // النقاط
        ctx.font = '30px Arial';
        ctx.fillText('النقاط: ' + score, displayWidth/2, rectY + 130);

        // زر 🔁
        const buttonWidth = 80;
        const buttonHeight = 60;
        const buttonX = displayWidth/2 - buttonWidth/2;
        const buttonY = rectY + rectHeight - 80;

        ctx.fillStyle = '#FFD700';
        ctx.fillRect(buttonX, buttonY, buttonWidth, buttonHeight);

        ctx.fillStyle = 'black';
        ctx.font = '40px Arial';
        ctx.fillText('🔁', displayWidth/2, buttonY + 45);

        gameOverButton = {x: buttonX, y: buttonY, w: buttonWidth, h: buttonHeight};
    }
}

function gameLoop(){ update(); requestAnimationFrame(gameLoop); }
gameLoop();

// إعادة ضبط حجم الشاشة
window.addEventListener('resize', ()=>{ location.reload(); });

</script>
</body>
</html>
