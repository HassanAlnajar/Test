<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flabby Swaddy</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #70c5ce;
    }
    canvas {
        border: 2px solid black;
        touch-action: manipulation;
        display: block;
    }
</style>
</head>
<body>
<canvas id="flappyBirdCanvas"></canvas>
<script>
const canvas = document.getElementById('flappyBirdCanvas');
const ctx = canvas.getContext('2d');

// شاشة كاملة + Retina
let displayWidth = window.innerWidth;
let displayHeight = window.innerHeight;
let scale = window.devicePixelRatio || 1;
canvas.width = displayWidth * scale;
canvas.height = displayHeight * scale;
canvas.style.width = displayWidth + "px";
canvas.style.height = displayHeight + "px";
ctx.scale(scale, scale);
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

// الخلفية
let bgImage = new Image();
bgImage.src = 'CE20DCB8-55BF-4363-9A95-0CFD053150F7.jpeg';

// الطائر
let birdImage = new Image();
birdImage.src = 'C5B8E2ED-5DF8-4A76-B9C4-210F07E30949.jpeg';
let bird = { x: 50, y: 150, width: 50, height: 50, gravity: 0.5, lift: -7, velocity: 0, hitbox: {w:40, h:40} };

let pipes = [];  
let score = 0;
let frame = 0;
let lastPipeY = displayHeight/2 - 75; // ارتفاع الفتحة السابقة

window.addEventListener('keydown', () => bird.velocity = bird.lift);
window.addEventListener('touchstart', (e) => {
    e.preventDefault();
    bird.velocity = bird.lift;
}, { passive: false });

// إنشاء أعمدة مع فتحة منطقية
function createPipe() {
    const gap = 150; // الفتحة للطائر الكبير
    const minY = 50;
    const maxY = displayHeight - gap - 50;
    // ارتفاع العمود العلوي مع تحديد الفرق مع الارتفاع السابق ليكون سلس
    let pipeY = lastPipeY + (Math.random()*300 - 100); // فرق ±100px
    if(pipeY < minY) pipeY = minY;
    if(pipeY > maxY) pipeY = maxY;
    lastPipeY = pipeY;

    pipes.push({ x: displayWidth, y: 0, width: 20, height: pipeY });
    pipes.push({ x: displayWidth, y: pipeY + gap, width: 20, height: displayHeight - pipeY - gap });
}

// تصادم حسب hitbox
function collision(pipe) {
    let hb = bird.hitbox;
    return (bird.x + (bird.width - hb.w)/2) < pipe.x + pipe.width &&
           (bird.x + (bird.width - hb.w)/2 + hb.w) > pipe.x &&
           (bird.y + (bird.height - hb.h)/2) < pipe.height &&
           (bird.y + (bird.height - hb.h)/2 + hb.h) > pipe.y;
}

function update() {
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (bird.y > displayHeight || bird.y < 0) resetGame();

    frame++;
    if (frame % 75 === 0) createPipe();

    pipes.forEach((pipe, index) => {
        pipe.x -= 1.4; // سرعة الأعمدة
        if(collision(pipe)) resetGame();
        if(pipe.x + pipe.width < 0){
            pipes.splice(index,1);
            score++;
        }
    });

    // رسم الخلفية
    if(bgImage.complete){
        // نأخذ منتصف الصورة تلقائيًا لتناسب الشاشة
        let ratio = Math.max(displayWidth/bgImage.width, displayHeight/bgImage.height);
        let w = bgImage.width*ratio;
        let h = bgImage.height*ratio;
        let sx = (w - displayWidth)/2 / ratio;
        let sy = (h - displayHeight)/2 / ratio;
        ctx.drawImage(bgImage, sx, sy, displayWidth/ratio, displayHeight/ratio, 0, 0, displayWidth, displayHeight);
    } else {
        ctx.fillStyle = '#70c5ce';
        ctx.fillRect(0,0,displayWidth,displayHeight);
    }

    // رسم الطائر
    if(birdImage.complete){
        ctx.save();
        ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
        ctx.drawImage(birdImage, -bird.width/2, -bird.height/2, bird.width, bird.height);
        ctx.restore();
    } else {
        ctx.fillStyle = 'yellow';
        ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
    }

    // رسم الأعمدة
    pipes.forEach(pipe => {
        ctx.fillStyle='yellow';
        ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
    });

    // عرض النقاط
    ctx.fillStyle='yellow';
    ctx.font='20px Arial';
    ctx.fillText('النقاط: '+score,10,20);
}

function resetGame(){
    bird.y = displayHeight/2;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    lastPipeY = displayHeight/2 - 75;
}

function gameLoop(){
    update();
    requestAnimationFrame(gameLoop);
}

gameLoop();

// إعادة ضبط حجم الشاشة
window.addEventListener('resize', ()=>{
    location.reload();
});
</script>
</body>
</html>
