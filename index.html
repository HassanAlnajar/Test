<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flabby Swaddy</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #70c5ce;
        }
        canvas {
            border: 2px solid black;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <canvas id="flappyBirdCanvas"></canvas>
    <script>
        const canvas = document.getElementById('flappyBirdCanvas');
        const ctx = canvas.getContext('2d');

        // حجم الشاشة الكامل
        const displayWidth = window.innerWidth;
        const displayHeight = window.innerHeight;

        // دعم الشاشات عالية الدقة (Retina)
        const scale = window.devicePixelRatio || 1;
        canvas.width = displayWidth * scale;
        canvas.height = displayHeight * scale;
        canvas.style.width = displayWidth + "px";
        canvas.style.height = displayHeight + "px";

        ctx.scale(scale, scale);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        let birdImage = new Image();
        birdImage.src = 'C5B8E2ED-5DF8-4A76-B9C4-210F07E30949.jpeg';

        let bird = { x: 50, y: 150, width: 50, height: 50, gravity: 0.5, lift: -7, velocity: 0 };
        let pipes = [];  
        let score = 0;
        let frame = 0;

        window.addEventListener('keydown', () => bird.velocity = bird.lift);
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            bird.velocity = bird.lift;
        }, { passive: false });

        function createPipe() {
            const minPipeHeight = 50; // الحد الأدنى للعمود العلوي
            const gap = 150; // فتحة للطائر الكبير
            const maxPipeHeight = displayHeight - gap - minPipeHeight;
            const pipeHeight = minPipeHeight + Math.random() * (maxPipeHeight - minPipeHeight);

            pipes.push({ x: displayWidth, y: 0, width: 20, height: pipeHeight });
            pipes.push({ x: displayWidth, y: pipeHeight + gap, width: 20, height: displayHeight - pipeHeight - gap });
        }

        function collision(pipe) {
            return bird.x < pipe.x + pipe.width &&
                   bird.x + bird.width > pipe.x &&
                   bird.y < pipe.height &&
                   bird.y + bird.height > pipe.y;
        }

        function update() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (bird.y > displayHeight || bird.y < 0) {
                resetGame();
            }

            frame++;
            if (frame % 75 === 0) {
                createPipe();
            }

            pipes.forEach((pipe, index) => {
                pipe.x -= 1.8; // سرعة الأعمدة متوازنة

                if (collision(pipe)) {
                    resetGame();
                }

                if (pipe.x + pipe.width < 0) {
                    pipes.splice(index, 1);
                    score++;
                }
            });

            ctx.clearRect(0, 0, displayWidth, displayHeight);

            // رسم الطائر بحجم HD
            if (birdImage.complete) {
                ctx.save();
                ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
                ctx.drawImage(birdImage, -bird.width / 2, -bird.height / 2, bird.width, bird.height);
                ctx.restore();
            } else {
                ctx.fillStyle = 'yellow';
                ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            }

            // رسم الأعمدة
            pipes.forEach(pipe => {
                ctx.fillStyle = 'green';
                ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
            });

            // عرض النقاط
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, 10, 20);
        }

        function resetGame() {
            bird.y = displayHeight / 2;
            bird.velocity = 0;
            pipes = [];
            score = 0;
        }

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        // تحديث اللعبة تلقائيًا إذا تم تغيير حجم الشاشة
        window.addEventListener('resize', () => {
            location.reload(); // أسهل طريقة لضبط canvas على حجم جديد
        });
    </script>
</body>
</html>
