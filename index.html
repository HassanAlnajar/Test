<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Sawadi</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #70c5ce;
    }
    canvas {
        border: 2px solid black;
        touch-action: manipulation;
        display: block;
    }
</style>
</head>
<body>
<canvas id="flappyBirdCanvas"></canvas>
<script>
const canvas = document.getElementById('flappyBirdCanvas');
const ctx = canvas.getContext('2d');

let displayWidth = window.innerWidth;
let displayHeight = window.innerHeight;
let scale = window.devicePixelRatio || 1;
canvas.width = displayWidth * scale;
canvas.height = displayHeight * scale;
canvas.style.width = displayWidth + "px";
canvas.style.height = displayHeight + "px";
ctx.scale(scale, scale);
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

let bgImage = new Image();
bgImage.src = 'CE20DCB8-55BF-4363-9A95-0CFD053150F7.jpeg';

let birdImage = new Image();
birdImage.src = 'C5B8E2ED-5DF8-4A76-B9C4-210F07E30949.jpeg';

let bird = {
    x: 50, y: 150, width: 50, height: 50,
    gravity: 0.5, lift: -7, velocity: 0,
    hitbox: { w: 40, h: 40 }
};

// نظام الـ Boost
let isHolding = false;
let holdStartTime = 0;
let isBoosting = false;
const HOLD_THRESHOLD = 200;
const BOOST_FORCE = -1.3;
const MAX_BOOST_VELOCITY = -11;

// آثار الطائر
let trails = [];

// موجات الهواء
let waves = [];

let pipes = [];
let score = 0;
let frame = 0;
let lastPipeY = displayHeight / 2 - 75;
let gameOver = false;
let finalScore = 0;

const btn = { x: 0, y: 0, w: 100, h: 55 };

// ── موجة الهواء ──
function spawnWave(big = false) {
    waves.push({
        x: bird.x + bird.width / 2,
        y: bird.y + bird.height / 2,
        radius: 5,
        maxRadius: big ? 90 : 55,
        alpha: big ? 0.7 : 0.5,
        lineWidth: big ? 3 : 1.8,
        color: big ? '0, 220, 255' : '180, 240, 255'
    });
}

function drawWaves() {
    waves.forEach(w => {
        const progress = w.radius / w.maxRadius;
        
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${w.color}, ${w.alpha})`;
        ctx.lineWidth = w.lineWidth;
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
        ctx.stroke();

        w.radius += w.maxRadius > 60 ? 4.5 : 3.5;
        w.alpha = (1 - progress) * (w.maxRadius > 60 ? 0.7 : 0.5);
        w.lineWidth *= 0.97;
    });

    waves = waves.filter(w => w.radius < w.maxRadius);
}


// ── أحداث الكيبورد ──
window.addEventListener('keydown', (e) => {
    if (gameOver) return;
    if (!isHolding) {
        isHolding = true;
        holdStartTime = Date.now();
        bird.velocity = bird.lift;
        spawnWave(false); // موجة عادية عند القفز
    }
});
window.addEventListener('keyup', () => {
    isHolding = false;
    isBoosting = false;
});

// ── أحداث اللمس ──
window.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (gameOver) {
        handleRestart(e.touches[0].clientX, e.touches[0].clientY);
        return;
    }
    isHolding = true;
    holdStartTime = Date.now();
    bird.velocity = bird.lift;
    spawnWave(false); // موجة عادية عند القفز
}, { passive: false });

window.addEventListener('touchend', () => {
    isHolding = false;
    isBoosting = false;
});

// ── أحداث الماوس ──
canvas.addEventListener('mousedown', (e) => {
    if (gameOver) {
        const rect = canvas.getBoundingClientRect();
        handleRestart(e.clientX - rect.left, e.clientY - rect.top);
        return;
    }
    isHolding = true;
    holdStartTime = Date.now();
    bird.velocity = bird.lift;
    spawnWave(false);
});
canvas.addEventListener('mouseup', () => {
    isHolding = false;
    isBoosting = false;
});

function handleRestart(cx, cy) {
    if (cx >= btn.x && cx <= btn.x + btn.w &&
        cy >= btn.y && cy <= btn.y + btn.h) {
        resetGame();
    }
}

function createPipe() {
    const gap = 130;
    const minY = 50;
    const maxY = displayHeight - gap - 50;
    const maxDiff = 300;
    let pipeY;
    if (Math.random() < 0.3) {
        pipeY = Math.random() * (maxY - minY) + minY;
    } else {
        let change = (Math.random() * 2 * maxDiff - maxDiff);
        pipeY = lastPipeY + change;
    }
    if (pipeY < minY) pipeY = minY;
    if (pipeY > maxY) pipeY = maxY;
    lastPipeY = pipeY;
    pipes.push({ x: displayWidth, y: 0, width: 20, height: pipeY });
    pipes.push({ x: displayWidth, y: pipeY + gap, width: 20, height: displayHeight - pipeY - gap });
}

function collision(pipe) {
    let hb = bird.hitbox;
    let bLeft   = bird.x + (bird.width - hb.w) / 2;
    let bRight  = bLeft + hb.w;
    let bTop    = bird.y + (bird.height - hb.h) / 2;
    let bBottom = bTop + hb.h;
    let pLeft  = pipe.x;
    let pRight = pipe.x + pipe.width;
    if (bRight <= pLeft || bLeft >= pRight) return false;
    if (pipe.y === 0 && bTop < pipe.height) return true;
    if (pipe.y > 0 && bBottom > pipe.y) return true;
    return false;
}

function drawBackground() {
    if (bgImage.complete && bgImage.naturalWidth > 0) {
        let ratio = Math.max(displayWidth / bgImage.width, displayHeight / bgImage.height);
        let w = bgImage.width * ratio;
        let h = bgImage.height * ratio;
        let sx = (w - displayWidth) / 2 / ratio;
        let sy = (h - displayHeight) / 2 / ratio;
        ctx.drawImage(bgImage, sx, sy, displayWidth / ratio, displayHeight / ratio, 0, 0, displayWidth, displayHeight);
    } else {
        ctx.fillStyle = '#70c5ce';
        ctx.fillRect(0, 0, displayWidth, displayHeight);
    }
}

function updateBoost() {
    if (isHolding && !isBoosting && !gameOver) {
        const holdDuration = Date.now() - holdStartTime;
        if (holdDuration > HOLD_THRESHOLD) {
            isBoosting = true;
            // موجة كبيرة لحظة تفعيل البوست
            spawnWave(true);
            spawnWave(true);
        }
    }

    if (isBoosting) {
        bird.velocity += BOOST_FORCE;
        if (bird.velocity < MAX_BOOST_VELOCITY) {
            bird.velocity = MAX_BOOST_VELOCITY;
        }

        if (frame % 2 === 0) {
            trails.push({
                x: bird.x,
                y: bird.y,
                width: bird.width,
                height: bird.height,
                alpha: 0.6,
                scale: 1.0
            });
        }

        // موجات متتالية أثناء البوست
        if (frame % 8 === 0) {
            spawnWave(true);
        }
    }
}

function drawTrails() {
    trails.forEach((t) => {
        ctx.save();
        ctx.globalAlpha = t.alpha;
        ctx.shadowColor = '#00cfff';
        ctx.shadowBlur = 18;
        ctx.translate(t.x + t.width / 2, t.y + t.height / 2);
        ctx.scale(t.scale, t.scale);
        if (birdImage.complete && birdImage.naturalWidth > 0) {
            ctx.drawImage(birdImage, -t.width / 2, -t.height / 2, t.width, t.height);
        }
        ctx.restore();
        t.alpha -= 0.06;
        t.scale -= 0.03;
    });
    trails = trails.filter(t => t.alpha > 0);
}

function drawBoostGlow() {
    if (!isBoosting) return;
    const cx = bird.x + bird.width / 2;
    const cy = bird.y + bird.height / 2;
    const pulse = Math.sin(Date.now() / 80) * 5;
    let gradient = ctx.createRadialGradient(cx, cy, 5, cx, cy, 40 + pulse);
    gradient.addColorStop(0, 'rgba(0, 200, 255, 0.5)');
    gradient.addColorStop(1, 'rgba(0, 200, 255, 0)');
    ctx.save();
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(cx, cy, 40 + pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, displayWidth, displayHeight);

    const boxW = 260;
    const boxH = 300;
    const boxX = displayWidth / 2 - boxW / 2;
    const boxY = displayHeight / 2 - boxH / 2 + 30;
    const radius = 22;

    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#fff8e7';
    ctx.beginPath();
    ctx.moveTo(boxX + radius, boxY);
    ctx.lineTo(boxX + boxW - radius, boxY);
    ctx.quadraticCurveTo(boxX + boxW, boxY, boxX + boxW, boxY + radius);
    ctx.lineTo(boxX + boxW, boxY + boxH - radius);
    ctx.quadraticCurveTo(boxX + boxW, boxY + boxH, boxX + boxW - radius, boxY + boxH);
    ctx.lineTo(boxX + radius, boxY + boxH);
    ctx.quadraticCurveTo(boxX, boxY + boxH, boxX, boxY + boxH - radius);
    ctx.lineTo(boxX, boxY + radius);
    ctx.quadraticCurveTo(boxX, boxY, boxX + radius, boxY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    const imgSize = 90;
    const imgX = displayWidth / 2 - imgSize / 2;
    const imgY = boxY - imgSize / 2;

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.25)';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffe082';
    ctx.beginPath();
    ctx.arc(displayWidth / 2, imgY + imgSize / 2, imgSize / 2 + 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(displayWidth / 2, imgY + imgSize / 2, imgSize / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    if (birdImage.complete && birdImage.naturalWidth > 0) {
        ctx.drawImage(birdImage, imgX, imgY, imgSize, imgSize);
    } else {
        ctx.fillStyle = 'yellow';
        ctx.fillRect(imgX, imgY, imgSize, imgSize);
    }
    ctx.restore();

    ctx.fillStyle = '#c0392b';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('ايا فايج', displayWidth / 2, boxY + 90);

    ctx.strokeStyle = '#f0d080';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(boxX + 30, boxY + 105);
    ctx.lineTo(boxX + boxW - 30, boxY + 105);
    ctx.stroke();

    ctx.fillStyle = '#555';
    ctx.font = '18px Arial';
    ctx.fillText('النقاط', displayWidth / 2, boxY + 135);

    ctx.fillStyle = '#e67e22';
    ctx.font = 'bold 42px Arial';
    ctx.fillText(finalScore, displayWidth / 2, boxY + 185);

    const btnW = 100;
    const btnH = 55;
    const btnX = displayWidth / 2 - btnW / 2;
    const btnY = boxY + 215;
    btn.x = btnX; btn.y = btnY; btn.w = btnW; btn.h = btnH;

    ctx.fillStyle = '#27ae60';
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 14);
    ctx.fill();

    ctx.font = '32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🔁', displayWidth / 2, btnY + 40);
    ctx.textAlign = 'left';
}

function update() {
    drawBackground();

    if (gameOver) {
        if (birdImage.complete && birdImage.naturalWidth > 0) {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.drawImage(birdImage, -bird.width / 2, -bird.height / 2, bird.width, bird.height);
            ctx.restore();
        }
        pipes.forEach(pipe => {
            ctx.fillStyle = 'yellow';
            ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
        });
        drawGameOverScreen();
        return;
    }

    updateBoost();

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (bird.y > displayHeight || bird.y < 0) triggerGameOver();

    frame++;
    if (frame % 75 === 0) createPipe();

    pipes = pipes.filter((pipe) => {
        pipe.x -= 3.2;
        if (collision(pipe)) triggerGameOver();
        if (pipe.x + pipe.width < 0) {
            score++;
            return false;
        }
        return true;
    });

    // الموجات (خلف كل شيء)
    drawWaves();

    // الآثار
    drawTrails();

    // توهج البوست
    drawBoostGlow();

    // الطائر
    if (birdImage.complete && birdImage.naturalWidth > 0) {
        ctx.save();
        if (isBoosting) {
            ctx.shadowColor = '#00cfff';
            ctx.shadowBlur = 20;
        }
        ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
        ctx.drawImage(birdImage, -bird.width / 2, -bird.height / 2, bird.width, bird.height);
        ctx.restore();
    } else {
        ctx.fillStyle = isBoosting ? '#00cfff' : 'yellow';
        ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
    }

    // الأعمدة
    pipes.forEach(pipe => {
        ctx.fillStyle = 'yellow';
        ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
    });

    // النقاط
    ctx.fillStyle = 'yellow';
    ctx.font = '20px Arial';
    ctx.fillText('النقاط: ' + score, 10, 20);

    // شريط البوست
    if (isHolding && !isBoosting) {
        const holdDuration = Date.now() - holdStartTime;
        const progress = Math.min(holdDuration / HOLD_THRESHOLD, 1);
        const barW = 60;
        const barX = bird.x + bird.width / 2 - barW / 2;
        const barY = bird.y - 18;

        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.roundRect(barX, barY, barW, 8, 4);
        ctx.fill();

        ctx.fillStyle = '#00cfff';
        ctx.beginPath();
        ctx.roundRect(barX, barY, barW * progress, 8, 4);
        ctx.fill();
    }
}

function triggerGameOver() {
    finalScore = score;
    gameOver = true;
    isHolding = false;
    isBoosting = false;
    trails = [];
    waves = [];
}

function resetGame() {
    bird.y = displayHeight / 2;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    frame = 0;
    lastPipeY = displayHeight / 2 - 75;
    gameOver = false;
    isHolding = false;
    isBoosting = false;
    trails = [];
    waves = [];
}

function gameLoop() {
    update();
    requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener('resize', () => { location.reload(); });
</script>
</body>
</html>
