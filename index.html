<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #70c5ce;
        }
        canvas {
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <canvas id="flappyBirdCanvas"></canvas>
    <script>
        const canvas = document.getElementById('flappyBirdCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 320;
        canvas.height = 480;

        let bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.5, lift: -10, velocity: 0 };
        let pipes = [];  
        let score = 0;
        let frame = 0;

        window.addEventListener('keydown', () => bird.velocity = bird.lift);
        window.addEventListener('touchstart', () => bird.velocity = bird.lift);

        function createPipe() {
            const pipeHeight = Math.random() * (canvas.height / 2);
            pipes.push({ x: canvas.width, y: 0, width: 20, height: pipeHeight });
            pipes.push({ x: canvas.width, y: pipeHeight + 100, width: 20, height: canvas.height - pipeHeight - 100 });
        }

        function collision(pipe) {
            return bird.x < pipe.x + pipe.width && bird.x + bird.width > pipe.x && bird.y < pipe.height && bird.y + bird.height > pipe.y;
        }

        function update() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (bird.y > canvas.height || bird.y < 0) {
                resetGame();
            }

            frame++;
            if (frame % 75 === 0) {
                createPipe();
            }

            pipes.forEach((pipe, index) => {
                pipe.x -= 2;
                if (collision(pipe)) {
                    resetGame();
                }
                if (pipe.x + pipe.width < 0) {
                    pipes.splice(index, 1);
                    score++;
                }
            });

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'yellow';
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);

            pipes.forEach(pipe => {
                ctx.fillStyle = 'green';
                ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
            });

            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, 10, 20);
        }

        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            pipes = [];
            score = 0;
        }

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
