<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

<title>Flappy Sawadi</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #70c5ce;
    }
    canvas {
        border: 2px solid black;
        touch-action: manipulation;
        display: block;
    }
    #nameInput {
        position: fixed;
        top: -100px;
        left: 0;
        opacity: 0;
        pointer-events: none;
    }
</style>
</head>
<body>
<input id="nameInput" type="text" maxlength="20" placeholder="اكتب اسمك">
<canvas id="flappyBirdCanvas"></canvas>
<script>
const API_URL = 'https://sized-julian-developing-alice.trycloudflare.com';

const canvas = document.getElementById('flappyBirdCanvas');
const ctx = canvas.getContext('2d');
const nameInput = document.getElementById('nameInput');

let displayWidth = window.innerWidth;
let displayHeight = window.innerHeight;
let scale = window.devicePixelRatio || 1;
canvas.width = displayWidth * scale;
canvas.height = displayHeight * scale;
canvas.style.width = displayWidth + "px";
canvas.style.height = displayHeight + "px";
ctx.scale(scale, scale);
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

let personalBest = parseInt(localStorage.getItem('flappy_best')) || 0;
let bgImage = new Image();
bgImage.src = 'CE20DCB8-55BF-4363-9A95-0CFD053150F7.jpeg';
let char1Image = new Image();
char1Image.src = 'C5B8E2ED-5DF8-4A76-B9C4-210F07E30949.jpeg';
let char2Image = new Image();
char2Image.src = 'IMG_4955.jpeg';

// ── الشخصية الحالية ──
let currentChar = localStorage.getItem('flappy_char') || 'char1';

function getBirdImage() {
    return currentChar === 'char2' ? char2Image : char1Image;
}

let bird = {
    x: 50, y: 150, width: 50, height: 50,
    gravity: 0.5, lift: -7, velocity: 0,
    hitbox: { w: 40, h: 40 }
};

let isHolding = false, holdStartTime = 0, isBoosting = false;
const HOLD_THRESHOLD = 200, BOOST_FORCE = -1.3, MAX_BOOST_VELOCITY = -11;
let bwProgress = 0;
let trails = [], waves = [], pipes = [];
let score = 0, frame = 0;
let lastPipeY = displayHeight / 2 - 75;
let gameOver = false, finalScore = 0;

// ── نظام المال ──
let sessionMoney = 0;       // مال الجلسة الحالية
let totalMoney = 0;         // إجمالي المال المحفوظ
let ownedChars = ['char1']; // الشخصيات المملوكة
let moneyEffects = [];      // تأثيرات +1000

// ── شاشة المتجر ──
let showShop = false;
let shopLeaderboardTab = 'session'; // 'session' أو 'rich'
let leaderboardRich = [];

// ── شخصية 2: الشفافية ──
let char2Phase = 'visible';   // 'visible' أو 'ghost'
let char2Timer = 0;
const CHAR2_VISIBLE_TIME = 90; // 1.5 ثانية (60fps)
const CHAR2_GHOST_TIME   = 120;
let char2GlowAlpha = 0;
let char2GlowDir = 1;

let playerName = localStorage.getItem('flappy_player_name') || '';
let isEnteringName = false;
let leaderboard = [];
let leaderboardLoaded = false;

const btn      = { x: 0, y: 0, w: 80,  h: 50 };
const nameBtn  = { x: 0, y: 0, w: 155, h: 50 };
const shopBtn  = { x: 0, y: 0, w: 100, h: 50 };

// ── API ──
async function loadLeaderboard() {
    try {
        const res = await fetch(`${API_URL}/scores`);
        leaderboard = await res.json();
    } catch(e) { leaderboard = []; }
    leaderboardLoaded = true;
}

async function saveScore(name, score) {
    try {
        const res = await fetch(`${API_URL}/scores`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, score })
        });
        leaderboard = await res.json();
    } catch(e) {}
    leaderboardLoaded = true;
}

async function loadPlayer(name) {
    try {
        const res = await fetch(`${API_URL}/player/${encodeURIComponent(name)}`);
        const data = await res.json();
        totalMoney = data.money || 0;
        ownedChars = data.characters || ['char1'];
    } catch(e) {}
}

async function addMoney(name, amount) {
    try {
        const res = await fetch(`${API_URL}/player/${encodeURIComponent(name)}/add_money`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount })
        });
        const data = await res.json();
        totalMoney = data.money || 0;
        ownedChars = data.characters || ['char1'];
    } catch(e) {}
}

async function buyCharacter(name, character, cost) {
    try {
        const res = await fetch(`${API_URL}/player/${encodeURIComponent(name)}/buy`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ character, cost })
        });
        const data = await res.json();
        if (!data.error) {
            totalMoney = data.money || 0;
            ownedChars = data.characters || ['char1'];
            return true;
        }
    } catch(e) {}
    return false;
}

async function loadRichest() {
    try {
        const res = await fetch(`${API_URL}/richest`);
        leaderboardRich = await res.json();
    } catch(e) { leaderboardRich = []; }
}

// ── اسم اللاعب ──
nameInput.addEventListener('blur', async () => {
    const val = nameInput.value.trim();
    if (val.length > 0) {
        playerName = val;
        localStorage.setItem('flappy_player_name', playerName);
        await loadPlayer(playerName);
        if (gameOver) {
            await addMoney(playerName, sessionMoney);
            await saveScore(playerName, score);
        }
    }
    isEnteringName = false;
    nameInput.style.pointerEvents = 'none';
});
nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') nameInput.blur(); });

function openNameInput() {
    isEnteringName = true;
    nameInput.style.pointerEvents = 'auto';
    nameInput.value = '';
    nameInput.focus();
}

// ── Waves ──
function spawnWave(big = false) {
    waves.push({
        x: bird.x + bird.width / 2,
        y: bird.y + bird.height / 2,
        radius: 5,
        maxRadius: big ? 90 : 55,
        alpha: big ? 0.7 : 0.5,
        lineWidth: big ? 3 : 1.8,
        color: big ? '0, 220, 255' : '180, 240, 255'
    });
}

function drawWaves() {
    waves.forEach(w => {
        const progress = w.radius / w.maxRadius;
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${w.color}, ${w.alpha})`;
        ctx.lineWidth = w.lineWidth;
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
        ctx.stroke();
        w.radius += w.maxRadius > 60 ? 4.5 : 3.5;
        w.alpha = (1 - progress) * (w.maxRadius > 60 ? 0.7 : 0.5);
        w.lineWidth *= 0.97;
    });
    waves = waves.filter(w => w.radius < w.maxRadius);
}

// ── تأثير +1000 دينار ──
function spawnMoneyEffect() {
    moneyEffects.push({
        x: bird.x + bird.width / 2,
        y: bird.y,
        alpha: 1,
        vy: -1.5
    });
}

function drawMoneyEffects() {
    moneyEffects.forEach(e => {
        ctx.save();
        ctx.globalAlpha = e.alpha;
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 16px Tajawal';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#e67e22';
        ctx.shadowBlur = 8;
        ctx.fillText('+1,000 د.ع', e.x, e.y);
        ctx.restore();
        e.y += e.vy;
        e.alpha -= 0.025;
    });
    moneyEffects = moneyEffects.filter(e => e.alpha > 0);
}

// ── أحداث ──
window.addEventListener('keydown', (e) => {
    if (isEnteringName || showShop) return;
    if (gameOver) return;
    if (!isHolding) {
        isHolding = true;
        holdStartTime = Date.now();
        bird.velocity = bird.lift;
        spawnWave(false);
    }
});
window.addEventListener('keyup', () => {
    if (!isEnteringName) { isHolding = false; isBoosting = false; }
});

window.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (isEnteringName) return;
    if (showShop) { handleShopTouch(e.touches[0].clientX, e.touches[0].clientY); return; }
    if (gameOver) { handleGameOverTouch(e.touches[0].clientX, e.touches[0].clientY); return; }
    isHolding = true;
    holdStartTime = Date.now();
    bird.velocity = bird.lift;
    spawnWave(false);
}, { passive: false });
window.addEventListener('touchend', () => {
    if (!isEnteringName && !showShop) { isHolding = false; isBoosting = false; }
});

canvas.addEventListener('mousedown', (e) => {
    if (isEnteringName) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    if (showShop) { handleShopTouch(cx, cy); return; }
    if (gameOver) { handleGameOverTouch(cx, cy); return; }
    isHolding = true;
    holdStartTime = Date.now();
    bird.velocity = bird.lift;
    spawnWave(false);
});
canvas.addEventListener('mouseup', () => {
    if (!isEnteringName && !showShop) { isHolding = false; isBoosting = false; }
});

// ── معالجة ضغط قائمة الخسارة ──
function handleGameOverTouch(cx, cy) {
    // زر إعادة اللعب
    if (cx >= btn.x && cx <= btn.x + btn.w &&
        cy >= btn.y && cy <= btn.y + btn.h) {
        resetGame(); return;
    }
    // زر المتجر
    if (cx >= shopBtn.x && cx <= shopBtn.x + shopBtn.w &&
        cy >= shopBtn.y && cy <= shopBtn.y + shopBtn.h) {
        showShop = true;
        loadRichest();
        return;
    }
    // زر الاسم
    if (!playerName &&
        cx >= nameBtn.x && cx <= nameBtn.x + nameBtn.w &&
        cy >= nameBtn.y && cy <= nameBtn.y + nameBtn.h) {
        openNameInput();
    }
}

// ── متغيرات المتجر ──
const shopBackBtn   = { x: 0, y: 0, w: 80,  h: 40 };
const shopBuyBtn    = { x: 0, y: 0, w: 140, h: 45 };
const shopSelectBtn = { x: 0, y: 0, w: 140, h: 45 };
const shopTabBtn1   = { x: 0, y: 0, w: 120, h: 36 };
const shopTabBtn2   = { x: 0, y: 0, w: 120, h: 36 };
let shopMessage = '';
let shopMessageTimer = 0;

// ── معالجة ضغط المتجر ──
async function handleShopTouch(cx, cy) {
    // زر الرجوع
    if (cx >= shopBackBtn.x && cx <= shopBackBtn.x + shopBackBtn.w &&
        cy >= shopBackBtn.y && cy <= shopBackBtn.y + shopBackBtn.h) {
        showShop = false; return;
    }


    // زر شراء سوادي الشبح
    if (cx >= shopBuyBtn.x && cx <= shopBuyBtn.x + shopBuyBtn.w &&
        cy >= shopBuyBtn.y && cy <= shopBuyBtn.y + shopBuyBtn.h) {
        if (!playerName) { shopMessage = 'سجّل اسمك أولاً!'; shopMessageTimer = 120; return; }
        if (ownedChars.includes('char2')) { shopMessage = 'تملكها بالفعل!'; shopMessageTimer = 120; return; }
        if (totalMoney < 100000) { shopMessage = 'رصيدك غير كافٍ!'; shopMessageTimer = 120; return; }
        const ok = await buyCharacter(playerName, 'char2', 100000);
        if (ok) { shopMessage = 'تم الشراء! 🎉'; shopMessageTimer = 120; }
        else { shopMessage = 'فشل الشراء!'; shopMessageTimer = 120; }
        return;
    }

    // زر اختيار سوادي الشبح
    if (cx >= shopSelectBtn.x && cx <= shopSelectBtn.x + shopSelectBtn.w &&
        cy >= shopSelectBtn.y && cy <= shopSelectBtn.y + shopSelectBtn.h) {
        if (ownedChars.includes('char2')) {
            currentChar = currentChar === 'char2' ? 'char1' : 'char2';
            localStorage.setItem('flappy_char', currentChar);
            shopMessage = currentChar === 'char2' ? '✅ تم اختيار سوادي الشبح!' : '✅ تم اختيار سوادي السريع!';
            shopMessageTimer = 120;
        }
        return;
    }

    // ✅ ضغط على بطاقة سوادي السريع مباشرة
    const c1X = displayWidth / 2 - 300 / 2 + 30;
    const c1Y = displayHeight / 2 - 480 / 2 + 85;
    if (cx >= c1X && cx <= c1X + 240 &&
        cy >= c1Y && cy <= c1Y + 80) {
        currentChar = 'char1';
        localStorage.setItem('flappy_char', currentChar);
        shopMessage = '✅ تم اختيار سوادي السريع!';
        shopMessageTimer = 120;
        return;
    }

    // ✅ ضغط على بطاقة سوادي الشبح مباشرة
    const c2X = displayWidth / 2 - 300 / 2 + 30;
    const c2Y = displayHeight / 2 - 480 / 2 + 185;
    if (cx >= c2X && cx <= c2X + 240 &&
        cy >= c2Y && cy <= c2Y + 80) {
        if (ownedChars.includes('char2')) {
            currentChar = 'char2';
            localStorage.setItem('flappy_char', currentChar);
            shopMessage = '✅ تم اختيار سوادي الشبح!';
            shopMessageTimer = 120;
        } else {
            shopMessage = '🔒 اشترِ الشخصية أولاً!';
            shopMessageTimer = 120;
        }
        return;
    }
}


// ── Pipes ──
function createPipe() {
    const gap = 130, minY = 50, maxY = displayHeight - gap - 50, maxDiff = 300;
    let pipeY;
    if (Math.random() < 0.3) pipeY = Math.random() * (maxY - minY) + minY;
    else pipeY = lastPipeY + (Math.random() * 2 * maxDiff - maxDiff);
    pipeY = Math.max(minY, Math.min(maxY, pipeY));
    lastPipeY = pipeY;
    pipes.push({ x: displayWidth, y: 0, width: 20, height: pipeY, passed: false });
    pipes.push({ x: displayWidth, y: pipeY + gap, width: 20, height: displayHeight - pipeY - gap, passed: false });
}

function collision(pipe) {
    // سوادي الشبح في وضع شفاف تعبر الأعمدة
    if (currentChar === 'char2' && char2Phase === 'ghost') return false;

    let hb = bird.hitbox;
    let bLeft = bird.x + (bird.width - hb.w) / 2, bRight = bLeft + hb.w;
    let bTop  = bird.y + (bird.height - hb.h) / 2, bBottom = bTop + hb.h;
    if (bRight <= pipe.x || bLeft >= pipe.x + pipe.width) return false;
    if (pipe.y === 0 && bTop < pipe.height) return true;
    if (pipe.y > 0  && bBottom > pipe.y)   return true;
    return false;
}

// ── رسم الخلفية ──
function drawBackground() {
    const offscreen = document.createElement('canvas');
    offscreen.width = canvas.width; offscreen.height = canvas.height;
    const offCtx = offscreen.getContext('2d');
    offCtx.scale(scale, scale);
    if (bgImage.complete && bgImage.naturalWidth > 0) {
        let ratio = Math.max(displayWidth / bgImage.width, displayHeight / bgImage.height);
        let sx = (bgImage.width * ratio - displayWidth) / 2 / ratio;
        let sy = (bgImage.height * ratio - displayHeight) / 2 / ratio;
        offCtx.drawImage(bgImage, sx, sy, displayWidth / ratio, displayHeight / ratio, 0, 0, displayWidth, displayHeight);
    } else {
        offCtx.fillStyle = '#70c5ce';
        offCtx.fillRect(0, 0, displayWidth, displayHeight);
    }
    if (bwProgress > 0) {
        offCtx.globalCompositeOperation = 'saturation';
        offCtx.fillStyle = `rgba(128,128,128,${bwProgress})`;
        offCtx.fillRect(0, 0, displayWidth, displayHeight);
        offCtx.globalCompositeOperation = 'source-over';
        offCtx.fillStyle = `rgba(0,0,0,${bwProgress * 0.15})`;
        offCtx.fillRect(0, 0, displayWidth, displayHeight);
    }
    ctx.drawImage(offscreen, 0, 0, canvas.width, canvas.height, 0, 0, displayWidth, displayHeight);
}

function drawPipes() {
    pipes.forEach(pipe => {
        const r = Math.round(255 * (1 - bwProgress) + 180 * bwProgress);
        const g = Math.round(255 * (1 - bwProgress) + 180 * bwProgress);
        const b = Math.round(180 * bwProgress);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.shadowBlur = 0;
        ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
    });
}

// ── تحديث شخصية 2 ──
function updateChar2() {
    if (currentChar !== 'char2') return;
    char2Timer++;
    if (char2Phase === 'visible' && char2Timer >= CHAR2_VISIBLE_TIME) {
        char2Phase = 'ghost';
        char2Timer = 0;
        // تأثير الدخول في الشفافية
        for (let i = 0; i < 3; i++) spawnChar2Effect('in');
    } else if (char2Phase === 'ghost' && char2Timer >= CHAR2_GHOST_TIME) {
        char2Phase = 'visible';
        char2Timer = 0;
        // تأثير العودة
        for (let i = 0; i < 3; i++) spawnChar2Effect('out');
    }
    // توهج نابض
    char2GlowAlpha += 0.05 * char2GlowDir;
    if (char2GlowAlpha >= 1) char2GlowDir = -1;
    if (char2GlowAlpha <= 0) char2GlowDir = 1;
}

// تأثيرات الشفافية
let char2Effects = [];
function spawnChar2Effect(type) {
    for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i;
        char2Effects.push({
            x: bird.x + bird.width / 2,
            y: bird.y + bird.height / 2,
            vx: Math.cos(angle) * (1.5 + Math.random()),
            vy: Math.sin(angle) * (1.5 + Math.random()),
            alpha: 1,
            radius: 4 + Math.random() * 4,
            color: type === 'in' ? '150, 50, 255' : '180, 50, 255'
        });
    }
}


function drawChar2Effects() {
    char2Effects.forEach(e => {
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${e.color}, ${e.alpha})`;
        ctx.shadowColor = `rgba(${e.color}, 0.8)`;
        ctx.shadowBlur = 10;
        ctx.fill();
        e.x += e.vx; e.y += e.vy;
        e.alpha -= 0.035;
        e.radius *= 0.97;
    });
    char2Effects = char2Effects.filter(e => e.alpha > 0);
    ctx.shadowBlur = 0;
}

// ── رسم الطائر ──
function drawBird() {
    const img = getBirdImage();
    if (!img.complete || !img.naturalWidth) {
        ctx.fillStyle = isBoosting ? '#00cfff' : 'yellow';
        ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
        return;
    }

    ctx.save();

    if (currentChar === 'char2') {
        if (char2Phase === 'ghost') {
            // شفاف مع توهج بنفسجي
            ctx.globalAlpha = 0.25 + char2GlowAlpha * 0.15;
            ctx.shadowColor = `rgba(150, 50, 255, ${0.6 + char2GlowAlpha * 0.4})`;
            ctx.shadowBlur = 20 + char2GlowAlpha * 15;
        } else {
            // عادي مع توهج أزرق خفيف
            ctx.globalAlpha = 1;
            ctx.shadowColor = 'rgba(0, 150, 255, 0.4)';
            ctx.shadowBlur = 8;
        }
    } else if (isBoosting) {
        ctx.shadowColor = '#00cfff';
        ctx.shadowBlur = 20;
    }

    ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
    ctx.drawImage(img, -bird.width / 2, -bird.height / 2, bird.width, bird.height);
    ctx.restore();
}

function updateBoost() {
    if (currentChar === 'char2') {
        isBoosting = false;
        bwProgress = Math.max(0, bwProgress - 0.05);
        return;
    }
    if (isHolding && !isBoosting && !gameOver) {
        if (Date.now() - holdStartTime > HOLD_THRESHOLD) {
            isBoosting = true; spawnWave(true); spawnWave(true);
        }
    }
    bwProgress = isBoosting ? Math.min(1, bwProgress + 0.05) : Math.max(0, bwProgress - 0.05);
    if (isBoosting) {
        bird.velocity = Math.max(MAX_BOOST_VELOCITY, bird.velocity + BOOST_FORCE);
        if (frame % 2 === 0) trails.push({ x: bird.x, y: bird.y, width: bird.width, height: bird.height, alpha: 0.6, scale: 1.0 });
        if (frame % 8 === 0) spawnWave(true);
    }
}


function drawTrails() {
    trails.forEach(t => {
        ctx.save();
        ctx.globalAlpha = t.alpha;
        ctx.shadowColor = '#00cfff'; ctx.shadowBlur = 18;
        ctx.translate(t.x + t.width / 2, t.y + t.height / 2);
        ctx.scale(t.scale, t.scale);
        const img = getBirdImage();
        if (img.complete && img.naturalWidth)
            ctx.drawImage(img, -t.width / 2, -t.height / 2, t.width, t.height);
        ctx.restore();
        t.alpha -= 0.06; t.scale -= 0.03;
    });
    trails = trails.filter(t => t.alpha > 0);
}

function drawBoostGlow() {
    if (!isBoosting) return;
    const cx = bird.x + bird.width / 2, cy = bird.y + bird.height / 2;
    const pulse = Math.sin(Date.now() / 80) * 5;
    let g = ctx.createRadialGradient(cx, cy, 5, cx, cy, 40 + pulse);
    g.addColorStop(0, 'rgba(0,200,255,0.5)');
    g.addColorStop(1, 'rgba(0,200,255,0)');
    ctx.save(); ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, 40 + pulse, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

// ── قائمة الخسارة ──
function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, displayWidth, displayHeight);

    const hasName  = !!playerName;
    const boxW     = 290;
    const lbHeight = leaderboard.length > 0 ? 185 : 0;
    const boxH     = 330 + lbHeight;
    const boxX     = displayWidth / 2 - boxW / 2;
    const boxY     = displayHeight / 2 - boxH / 2;
    const radius   = 22;

    ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 18;
    ctx.fillStyle = '#fff8e7';
    ctx.beginPath();
    ctx.moveTo(boxX + radius, boxY);
    ctx.lineTo(boxX + boxW - radius, boxY);
    ctx.quadraticCurveTo(boxX + boxW, boxY, boxX + boxW, boxY + radius);
    ctx.lineTo(boxX + boxW, boxY + boxH - radius);
    ctx.quadraticCurveTo(boxX + boxW, boxY + boxH, boxX + boxW - radius, boxY + boxH);
    ctx.lineTo(boxX + radius, boxY + boxH);
    ctx.quadraticCurveTo(boxX, boxY + boxH, boxX, boxY + boxH - radius);
    ctx.lineTo(boxX, boxY + radius);
    ctx.quadraticCurveTo(boxX, boxY, boxX + radius, boxY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // صورة اللاعب
    const imgSize = 90;
    const imgX = displayWidth / 2 - imgSize / 2;
    const imgY = boxY - imgSize / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffe082';
    ctx.beginPath();
    ctx.arc(displayWidth / 2, imgY + imgSize / 2, imgSize / 2 + 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(displayWidth / 2, imgY + imgSize / 2, imgSize / 2, 0, Math.PI * 2);
    ctx.clip();
    const bImg = getBirdImage();
    if (bImg.complete && bImg.naturalWidth)
        ctx.drawImage(bImg, imgX, imgY, imgSize, imgSize);
    ctx.restore();

    ctx.fillStyle = '#c0392b'; ctx.font = 'bold 28px Tajawal'; ctx.textAlign = 'center';
    ctx.fillText('ايا فايج', displayWidth / 2, boxY + 82);

    ctx.strokeStyle = '#f0d080'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(boxX + 30, boxY + 95); ctx.lineTo(boxX + boxW - 30, boxY + 95);
    ctx.stroke();

    // النقاط والمال
    ctx.fillStyle = '#555'; ctx.font = '14px Tajawal';
    ctx.fillText('النقاط', displayWidth / 2, boxY + 116);
    ctx.fillStyle = '#e67e22'; ctx.font = 'bold 34px Tajawal';
    ctx.fillText(finalScore, displayWidth / 2, boxY + 152);

    ctx.fillStyle = '#27ae60'; ctx.font = 'bold 16px Tajawal';
    sessionMoney && ctx.fillText(`💰 +${sessionMoney.toLocaleString()} د.ع`, displayWidth / 2, boxY + 178);
    ctx.fillStyle = '#888'; ctx.font = '13px Tajawal';
    ctx.fillText(`فلوسك: ${totalMoney.toLocaleString()} د.ع`, displayWidth / 2, boxY + 198);

    // Leaderboard
    if (leaderboard.length > 0) {
        ctx.strokeStyle = '#f0d080'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(boxX + 30, boxY + 210); ctx.lineTo(boxX + boxW - 30, boxY + 210);
        ctx.stroke();
        ctx.fillStyle = '#888'; ctx.font = 'bold 12px Tajawal';
        ctx.fillText('🏆 أفضل اللاعبين', displayWidth / 2, boxY + 226);
        leaderboard.slice(0, 5).forEach((s, i) => {
            const isMe = s.name === playerName;
            ctx.fillStyle = isMe ? '#e67e22' : '#444';
            ctx.font = isMe ? 'bold 12px Tajawal' : '12px Tajawal';
            const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
            ctx.fillText(`${medals[i]} ${s.name}  —  ${s.score}`, displayWidth / 2, boxY + 244 + i * 20);
        });
    }

    if (!leaderboardLoaded) {
        ctx.fillStyle = '#aaa'; ctx.font = '12px Tajawal';
        ctx.fillText('جاري التحميل...', displayWidth / 2, boxY + 210);
    }

    // ── الأزرار ──
    const btnAreaY = boxY + boxH - 65;
    const gap = 8;

    if (hasName) {
        // زران: إعادة + متجر
        btn.w = 80; btn.h = 50;
        shopBtn.w = 100; shopBtn.h = 50;
        const totalW = btn.w + gap + shopBtn.w;
        btn.x = displayWidth / 2 - totalW / 2; btn.y = btnAreaY;
        shopBtn.x = btn.x + btn.w + gap; shopBtn.y = btnAreaY;

        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 14); ctx.fill();
        ctx.font = '28px Tajawal'; ctx.textAlign = 'center';
        ctx.fillText('🔁', btn.x + btn.w / 2, btnAreaY + 34);

        ctx.fillStyle = '#8e44ad';
        ctx.beginPath(); ctx.roundRect(shopBtn.x, shopBtn.y, shopBtn.w, shopBtn.h, 14); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = 'bold 13px Tajawal';
        ctx.fillText('🛒 المتجر', shopBtn.x + shopBtn.w / 2, btnAreaY + 32);
    } else {
        // ثلاثة أزرار
        btn.w = 65; btn.h = 50;
        shopBtn.w = 90; shopBtn.h = 50;
        nameBtn.w = 130; nameBtn.h = 50;
        const totalW = btn.w + gap + shopBtn.w + gap + nameBtn.w;
        btn.x = displayWidth / 2 - totalW / 2; btn.y = btnAreaY;
        shopBtn.x = btn.x + btn.w + gap; shopBtn.y = btnAreaY;
        nameBtn.x = shopBtn.x + shopBtn.w + gap; nameBtn.y = btnAreaY;

        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 14); ctx.fill();
        ctx.font = '26px Tajawal'; ctx.textAlign = 'center';
        ctx.fillText('🔁', btn.x + btn.w / 2, btnAreaY + 33);

        ctx.fillStyle = '#8e44ad';
        ctx.beginPath(); ctx.roundRect(shopBtn.x, shopBtn.y, shopBtn.w, shopBtn.h, 14); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = 'bold 12px Tajawal';
        ctx.fillText('🛒 المتجر', shopBtn.x + shopBtn.w / 2, btnAreaY + 32);

        ctx.fillStyle = '#3498db';
        ctx.beginPath(); ctx.roundRect(nameBtn.x, nameBtn.y, nameBtn.w, nameBtn.h, 14); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = 'bold 11px Tajawal';
        ctx.fillText('اكتب اسمك ✏️', nameBtn.x + nameBtn.w / 2, btnAreaY + 32);
    }
    ctx.textAlign = 'left';
}

// ── شاشة المتجر ──
function drawShopScreen() {
    // خلفية شبه شفافة
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, displayWidth, displayHeight);

    const boxW = 300, boxH = 480;
    const boxX = displayWidth / 2 - boxW / 2;
    const boxY = displayHeight / 2 - boxH / 2;
    const r = 22;

    ctx.fillStyle = '#1a1a2e';
    ctx.shadowColor = 'rgba(150,50,255,0.5)'; ctx.shadowBlur = 25;
    ctx.beginPath();
    ctx.moveTo(boxX + r, boxY);
    ctx.lineTo(boxX + boxW - r, boxY);
    ctx.quadraticCurveTo(boxX + boxW, boxY, boxX + boxW, boxY + r);
    ctx.lineTo(boxX + boxW, boxY + boxH - r);
    ctx.quadraticCurveTo(boxX + boxW, boxY + boxH, boxX + boxW - r, boxY + boxH);
    ctx.lineTo(boxX + r, boxY + boxH);
    ctx.quadraticCurveTo(boxX, boxY + boxH, boxX, boxY + boxH - r);
    ctx.lineTo(boxX, boxY + r);
    ctx.quadraticCurveTo(boxX, boxY, boxX + r, boxY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // عنوان
    ctx.fillStyle = '#e0aaff'; ctx.font = 'bold 22px Tajawal'; ctx.textAlign = 'center';
    ctx.fillText('🛒 متجر الشخصيات', displayWidth / 2, boxY + 40);

    // رصيد
    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 14px Tajawal';
    ctx.fillText(`💰 رصيدك: ${totalMoney.toLocaleString()} د.ع`, displayWidth / 2, boxY + 65);

    // ── سوادي السريع ──
    const c1X = boxX + 30, c1Y = boxY + 85;
    const isC1Selected = currentChar === 'char1';
    ctx.fillStyle = isC1Selected ? 'rgba(0,150,255,0.3)' : 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.roundRect(c1X, c1Y, boxW - 60, 90, 12); ctx.fill();
    ctx.strokeStyle = isC1Selected ? '#00cfff' : '#444';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(c1X, c1Y, boxW - 60, 90, 12); ctx.stroke();

    if (char1Image.complete && char1Image.naturalWidth)
        ctx.drawImage(char1Image, c1X + 8, c1Y + 8, 64, 64);

    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Tajawal'; ctx.textAlign = 'left';
    ctx.fillText('سوادي السريع', c1X + 82, c1Y + 28); 
    ctx.fillStyle = '#aaa'; ctx.font = '10px "Tajawal"';
    ctx.fillText('⚡ عند الضغط المطوّل', c1X + 82, c1Y + 44);
    ctx.fillText('سوادي سيبطأ الزمن', c1X + 82, c1Y + 58);
    ctx.fillStyle = '#27ae60'; ctx.font = 'bold 11px Tajawal';
    ctx.fillText('✅ تملكها', c2X + 82, c2Y + 74);

    // ── سوادي الشبح ──
    const c2X = boxX + 30, c2Y = boxY + 185;
    const isOwned2  = ownedChars.includes('char2');
    const isC2Selected = currentChar === 'char2';
    ctx.fillStyle = isC2Selected ? 'rgba(142,68,173,0.3)' : 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.roundRect(c2X, c2Y, boxW - 60, 90, 12); ctx.fill();
    ctx.strokeStyle = isC2Selected ? '#8e44ad' : '#444';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(c2X, c2Y, boxW - 60, 90, 12); ctx.stroke();

    if (char2Image.complete && char2Image.naturalWidth) {
        ctx.save();
        if (!isOwned2) ctx.globalAlpha = 0.4;
        ctx.drawImage(char2Image, c2X + 8, c2Y + 8, 64, 66);
        ctx.restore();
    }

    ctx.fillStyle = isOwned2 ? '#fff' : '#888'; ctx.font = 'bold 14px Tajawal'; ctx.textAlign = 'left';
    ctx.fillText('سوادي الشبح', c2X + 82, c2Y + 28);
    ctx.fillStyle = '#aaa'; ctx.font = '10px "Tajawal"';
    ctx.fillText('👻 كل ثانية ونصف يصبح', c2X + 82, c2Y + 44);
    ctx.fillText('شبحًا لمدة ثانيتين', c2X + 82, c2Y + 58);
    if (!isOwned2) {
        ctx.fillStyle = '#e74c3c'; ctx.font = 'bold 11px Tajawal';
        ctx.fillText('🔒 100,000 د.ع', c2X + 82, c2Y + 74);
    } else {
        ctx.fillStyle = '#27ae60'; ctx.font = 'bold 11px Tajawal';
        ctx.fillText('✅ تملكها', c2X + 82, c2Y + 74);
    }

    // زر شراء / اختيار
    const btnY2 = c2Y + 90;
    if (!isOwned2) {
        shopBuyBtn.x = displayWidth / 2 - 70; shopBuyBtn.y = btnY2;
        shopBuyBtn.w = 140; shopBuyBtn.h = 42;
        ctx.fillStyle = totalMoney >= 100000 ? '#e74c3c' : '#555';
        ctx.beginPath(); ctx.roundRect(shopBuyBtn.x, shopBuyBtn.y, shopBuyBtn.w, shopBuyBtn.h, 12); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = 'bold 13px Tajawal'; ctx.textAlign = 'center';
        ctx.fillText('🛒 شراء 100,000 د.ع', displayWidth / 2, btnY2 + 27);
    } else {
        shopSelectBtn.x = displayWidth / 2 - 70; shopSelectBtn.y = btnY2;
        shopSelectBtn.w = 140; shopSelectBtn.h = 42;
        ctx.fillStyle = isC2Selected ? '#8e44ad' : '#27ae60';
        ctx.beginPath(); ctx.roundRect(shopSelectBtn.x, shopSelectBtn.y, shopSelectBtn.w, shopSelectBtn.h, 12); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = 'bold 13px Tajawal'; ctx.textAlign = 'center';
        ctx.fillText(isC2Selected ? '✅ محددة' : '▶ اختيار', displayWidth / 2, btnY2 + 27);
    }
    
    const lbY = btnY2 + 58;
    ctx.strokeStyle = 'rgba(150,50,255,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(boxX + 20, lbY); ctx.lineTo(boxX + boxW - 20, lbY);
    ctx.stroke();
    
    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 13px Tajawal'; ctx.textAlign = 'center';
    ctx.fillText('💰 أغنى اللاعبين', displayWidth / 2, lbY + 18);
    
    leaderboardRich.slice(0, 4).forEach((s, i) => {
        const isMe = s.name === playerName;
        ctx.fillStyle = isMe ? '#f1c40f' : '#ccc';
        ctx.font = isMe ? 'bold 11px Tajawal' : '11px Tajawal';
        ctx.textAlign = 'center';
        const medals = ['🥇','🥈','🥉','4️⃣'];
        ctx.fillText(`${medals[i]} ${s.name} — ${(s.money||0).toLocaleString()} د.ع`, displayWidth / 2, lbY + 36 + i * 18);
    });


    // رسالة
    if (shopMessageTimer > 0) {
        ctx.fillStyle = '#2ecc71'; ctx.font = 'bold 14px Tajawal'; ctx.textAlign = 'center';
        ctx.fillText(shopMessage, displayWidth / 2, boxY + boxH - 55);
        shopMessageTimer--;
    }

    // زر الرجوع
    shopBackBtn.x = boxX + 10; shopBackBtn.y = boxY + 10;
    shopBackBtn.w = 70; shopBackBtn.h = 36;
    ctx.fillStyle = '#c0392b';
    ctx.beginPath(); ctx.roundRect(shopBackBtn.x, shopBackBtn.y, shopBackBtn.w, shopBackBtn.h, 10); ctx.fill();
    ctx.fillStyle = 'white'; ctx.font = 'bold 12px Tajawal'; ctx.textAlign = 'center';
    ctx.fillText('← رجوع', shopBackBtn.x + shopBackBtn.w / 2, shopBackBtn.y + 24);

    ctx.textAlign = 'left';
}

// ── update ──
function update() {
    drawBackground();

    if (showShop) {
        drawShopScreen();
        return;
    }

    if (gameOver) {
        if (getBirdImage().complete) {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.drawImage(getBirdImage(), -bird.width / 2, -bird.height / 2, bird.width, bird.height);
            ctx.restore();
        }
        drawPipes();
        drawGameOverScreen();
        return;
    }

    updateChar2();
    updateBoost();

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;
    if (bird.y > displayHeight || bird.y < 0) triggerGameOver();

    frame++;
    if (frame % 75 === 0) createPipe();

    pipes = pipes.filter(pipe => {
        pipe.x -= 3.2;
        if (collision(pipe)) triggerGameOver();
        // حساب المال عند تجاوز عمود علوي فقط
        if (!pipe.passed && pipe.y === 0 && pipe.x + pipe.width < bird.x) {
    pipe.passed = true;
    score++;
    if (score > personalBest) {
        sessionMoney += 1000;
        spawnMoneyEffect();
    }
}

        if (pipe.x + pipe.width < 0) return false;
        return true;
    });

    drawPipes();
    drawChar2Effects();
    drawWaves();
    drawTrails();
    drawBoostGlow();
    drawBird();
    drawMoneyEffects();

    // النقاط والمال
    const sc = bwProgress > 0
    ? `rgb(${Math.round(255-55*bwProgress)},${Math.round(255-55*bwProgress)},${Math.round(255-55*bwProgress)})`
    : 'yellow';
    ctx.fillStyle = sc; ctx.shadowBlur = 0;
    ctx.font = '18px Tajawal';
    ctx.fillText(`النقاط: ${score} | 🏆: ${personalBest}`, 10, 22);
    ctx.fillStyle = bwProgress > 0 ? sc : '#f1c40f';
    ctx.font = 'bold 14px Tajawal';
    ctx.fillText(`💸 ${sessionMoney.toLocaleString()} د.ع`, 10, 42);


    // شريط البوست
    if (isHolding && !isBoosting && currentChar !== 'char2') {
        const progress = Math.min((Date.now() - holdStartTime) / HOLD_THRESHOLD, 1);
        const barW = 60, barX = bird.x + bird.width / 2 - 30, barY = bird.y - 18;
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath(); ctx.roundRect(barX, barY, barW, 8, 4); ctx.fill();
        ctx.fillStyle = '#00cfff';
        ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, 8, 4); ctx.fill();
    }

    // مؤشر سوادي الشبح
        // مؤشر سوادي الشبح — شريط بنفسجي
    if (currentChar === 'char2') {
    const barW = 60;
    const barX = bird.x + bird.width / 2 - barW / 2;
    const barY = bird.y - 18;

    // خلفية الشريط
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect(barX, barY, barW, 8, 4); ctx.fill();

    // حساب التقدم
    const progress = char2Phase === 'visible'
        ? char2Timer / CHAR2_VISIBLE_TIME      // يمتلئ
        : 1 - (char2Timer / CHAR2_GHOST_TIME); // ينقص

    ctx.fillStyle = char2Phase === 'ghost' ? '#b388ff' : '#9c27b0';
    ctx.shadowColor = '#9c27b0';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, 8, 4); ctx.fill();
    ctx.shadowBlur = 0;
}

} // ← إغلاق دالة update()

async function triggerGameOver() {
    if (gameOver) return;
    finalScore = score;
    gameOver = true;
    isHolding = false; isBoosting = false;
    trails = []; waves = []; bwProgress = 0;
    leaderboardLoaded = false;
    if (score > personalBest) {     personalBest = score;     localStorage.setItem('flappy_best', personalBest); }
    if (playerName) {
        await addMoney(playerName, sessionMoney);
        await saveScore(playerName, finalScore);
    } else {
        loadLeaderboard();
    }
}

function resetGame() {
    bird.y = displayHeight / 2; bird.velocity = 0;
    pipes = []; score = 0; frame = 0;
    lastPipeY = displayHeight / 2 - 75;
    gameOver = false; showShop = false;
    isHolding = false; isBoosting = false;
    trails = []; waves = []; bwProgress = 0;
    sessionMoney = 0; moneyEffects = [];
    char2Phase = 'visible'; char2Timer = 0; char2Effects = [];
}

function gameLoop() { update(); requestAnimationFrame(gameLoop); }

if (playerName) loadPlayer(playerName);
loadLeaderboard();
gameLoop();

window.addEventListener('resize', () => { location.reload(); });
</script>
