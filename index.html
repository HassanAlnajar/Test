<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game</title>
    <style>
        /* Basic styling for the game */
        canvas { border: 1px solid black; }
    </style>
</head>
<body>
    <h1>Welcome to My Game</h1>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Entertainment</a></li>
        </ul>
    </nav>

    <h2>Flappy Bird - Biology Edition</h2>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.5, lift: -10, velocity: 0 };
        let obstacles = [];
        let score = 0;

        function setup() {
            obstacles.push({ x: canvas.width, height: Math.random() * 200 + 20 });
            setInterval(addObstacle, 2000);
            requestAnimationFrame(draw);
        }

        function addObstacle() {
            obstacles.push({ x: canvas.width, height: Math.random() * 200 + 20 });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'lightblue';
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= 4;
                ctx.fillStyle = 'green';
                ctx.fillRect(obstacles[i].x, canvas.height - obstacles[i].height, 20, obstacles[i].height);
                if (bird.x < obstacles[i].x + 20 && bird.x + bird.width > obstacles[i].x) {
                    if (bird.y + bird.height > canvas.height - obstacles[i].height) {
                        alert('Game Over! Your score: ' + score);
                        document.location.reload();
                    }
                }
            }

            score++; // Increment score over time
            ctx.fillStyle = 'black';
            ctx.fillText('Score: ' + score, 10, 20);

            requestAnimationFrame(draw);
        }

        document.addEventListener('keydown', () => {
            bird.velocity += bird.lift;
        });

        setup();
    </script>
</body>
</html>
